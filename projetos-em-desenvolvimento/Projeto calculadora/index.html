<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      }

      body {
        height: 100vh;
        background-color: #f5f5f5;
      }

      header {
        text-align: center;
        padding: 1rem;
        background-color: hsl(0, 0%, 20%);
        color: white;
      }

      main {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 91vh;
      }

      #calculator {
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        width: 340px;
        height: 475px;
        background-color: hsl(0, 0%, 20%);
        padding: 1rem;
        border-radius: 16px;
      }

      #screen {
        width: 100%;
        height: 75px;
        padding: 23px 10px;
        background-color: white;
        border: none;
        margin-bottom: 30px;
        border-radius: 16px;
        font-size: 1.7em;
      }

      #keys {
        display: grid;
        grid-template: repeat(4, 1fr) / repeat(4, 1fr);
        gap: 0.5rem;

        width: 100%;
        aspect-ratio: 1/1;
      }

      button {
        border-radius: 50%;
        font-size: larger;
        border: none;
      }

      button.operation {
        background-color: hsl(39, 100%, 50%);
      }
    </style>
    <title>Projeto calculadora</title>
  </head>
  <body>
    <header>
      <h1>Projeto calculadora</h1>
    </header>
    <main>
      <section id="calculator">
        <output id="screen">
          <!--Numbers-->
        </output>
        <div id="keys">
          <button onclick="showOnScreen('+')" class="operation">+</button>
          <button onclick="showOnScreen('1')">1</button>
          <button onclick="showOnScreen('2')">2</button>
          <button onclick="showOnScreen('3')">3</button>
          <button onclick="showOnScreen('-')" class="operation">-</button>
          <button onclick="showOnScreen('4')">4</button>
          <button onclick="showOnScreen('5')">5</button>
          <button onclick="showOnScreen('6')">6</button>
          <button onclick="showOnScreen('*')" class="operation">*</button>
          <button onclick="showOnScreen('7')">7</button>
          <button onclick="showOnScreen('8')">8</button>
          <button onclick="showOnScreen('9')">9</button>
          <button onclick="showOnScreen('/')" class="operation">/</button>
          <button onclick="showOnScreen('0')">0</button>
          <button onclick="clearScreen()">C</button>
          <button onclick="calcular()">=</button>
        </div>
      </section>
    </main>
    <script>
       const screen = document.getElementById("screen");

      function showOnScreen(digit) {
        screen.textContent += digit;
      }

      function calcular() {
        try {
          screen.textContent = eval(screen.textContent);
        } catch (error) {
          screen.textContent = "Error";
        }
      }

      function clearScreen() {
        screen.textContent = "";
      }
    </script>
  </body>
</html>
