<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Improved login page</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/f942de152b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main>
      <section id="details">
        <img src="logo.png" alt="Logo" class="logo" />
        <h1>
          Login to your <span class="enterprise-name">Spectre</span> account.
        </h1>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Reprehenderit
          sit totam obcaecati possimus ratione ipsam fuga unde minima reiciendis
          excepturi!
        </p>
      </section>
      <section id="formulary">
        <form action="#" method="post" autocomplete="on">
          <label for="email">Email or phone number</label>
          <div class="input-container">
            <input
              type="email"
              name=""
              id="email"
              placeholder="yourname@company.com"
              autocomplete="email"
            />
          </div>
          <label for="pwd">Password</label>
          <div class="input-container">
            <input
              type="password"
              name=""
              id="pwd"
              autocomplete="current-password"
            />
            <i class="fa-solid fa-eye"></i>
          </div>
          <a href="#" target="_blank">Forgot your password?</a>
          <input type="submit" value="Continue" />
        </form>
        <p>Or sign in with:</p>
        <div class="brands">
          <a href="#" target="_self"><i class="fa-brands fa-google"></i></a>
          <a href="#" target="_self"><i class="fa-brands fa-apple"></i></a>
        </div>
      </section>
    </main>
  </body>
</html>
