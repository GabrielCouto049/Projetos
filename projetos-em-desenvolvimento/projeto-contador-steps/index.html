<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Projeto contador</title>
</head>
<body>
    <header>
        <h1>Vamos contar</h1>
    </header>
    <main>
        <label for="start">Início:
            <input type="number" name="n1" id="start">
        </label>
        <label for="end">Fim:
            <input type="number" name="n2" id="end">
        </label>
        <label for="step">Passo:
            <input type="number" name="n3" id="step">
        </label>
        <button id="send">Enviar</button>
        <p id="output">Preparando a contagem...</p>
    </main>
    <footer>
        <p>Me siga no meu <a href="https://www.gabrielcouto049.github.io" rel="nofollow">Github</a></p>
    </footer>
    <script src="script.js"></script>
